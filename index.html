<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Survey</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 20px; font-size: 20px; }
        .input-field {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }
        .input-field:focus { border-color: #007bff; }
        .btn-option, .btn-start {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }
        .btn-option { text-align: left; }
        .btn-option:hover, .btn-start:hover { background-color: #0056b3; }
        .hidden { display: none; }
        .success-msg { color: #28a745; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="name-screen">
        <h2>Welcome! Please Enter Your Name to Start</h2>
        <input type="text" id="user-name" class="input-field" placeholder="Yahan naam likhein..." required>
        <button class="btn-start" onclick="startQuiz()">Next</button>
    </div>

    <div id="quiz-content" class="hidden">
        <h2 id="question-text">Loading question...</h2>
        <div id="options-container"></div>
    </div>
    
    <div id="end-screen" class="hidden">
        <p class="success-msg">Thank you for participating!</p>
        <p>Aapka response successfully save ho gaya hai.</p>
    </div>
</div>

<script>
    const questions = [
        {
            q: "Pore hafte ki thakawat ke baad, aapka weekend manane ka perfect tareeqa kya hai?",
            options: [
                { text: "Apne kamre me sukoon se baith kar koi movie dekhna, gaming karna, ya akele waqt guzarna.", val: "I" },
                { text: "Doston ke sath baahir ghoomne jana, kisi party me shamil hona, ya logon se milna.", val: "E" }
            ]
        },
        {
            q: "Jab aap koi naya business ya kaam shuru karne ka sochte hain, to aap kis cheez par zyada focus karte hain?",
            options: [
                { text: "Jo cheez pehle se market me chal rahi hai aur jiske pakke data/facts mojood hain.", val: "S" },
                { text: "Future ke naye trends aur unique ideas jo abhi tak kisi ne try na kiye hon.", val: "N" }
            ]
        },
        {
            q: "Agar aapka kisi dost ke sath koi bada masla ya jhagra ho jae, to aap use kaise hal karte hain?",
            options: [
                { text: "Pure logic aur mudday par baat karta hu—jo sahi hai wahi hoga, chahay bura lage.", val: "T" },
                { text: "Dost ke jazbaat aur rishte ko bachane ke liye thoda lachak dikhata hu.", val: "F" }
            ]
        },
        {
            q: "Aapka aam tor par kaam karne ya zindagi guzaarne ka style kya hai?",
            options: [
                { text: "Mujhe har cheez pehle se pre-planned aur strict schedule ke mutabiq pasand hai.", val: "J" },
                { text: "Main aakhri lamhe tak flexible rehta hu aur situation ke mutabiq chalna pasand karta hu.", val: "P" }
            ]
        }
    ];

    let currentIdx = 0;
    let finalCode = "";
    let userName = "";
    
    // ⚠️ UPDATE THIS LINK AFTER DEPLOYING YOUR BACKEND ON RENDER   
    const SERVER_URL = "http://localhost:3000/save-code";
    function startQuiz() {
        const nameInput = document.getElementById("user-name").value.trim();
        if (nameInput === "") {
            alert("Please enter your name!");
            return;
        }
        userName = nameInput;
        document.getElementById("name-screen").classList.add("hidden");
        document.getElementById("quiz-content").classList.remove("hidden");
        loadQuestion();
    }

    function loadQuestion() {
        if(currentIdx >= questions.length) {
            submitData();
            return;
        }
        
        const currentQ = questions[currentIdx];
        document.getElementById("question-text").innerText = currentQ.q;
        const optionsDiv = document.getElementById("options-container");
        optionsDiv.innerHTML = "";
        
        currentQ.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "btn-option";
            btn.innerText = opt.text;
            btn.onclick = () => {
                finalCode += opt.val;
                currentIdx++;
                loadQuestion();
            };
            optionsDiv.appendChild(btn);
        });
    }

    function submitData() {
        document.getElementById("quiz-content").classList.add("hidden");
        document.getElementById("end-screen").classList.remove("hidden");

        fetch(SERVER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: userName, code: finalCode, timestamp: new Date() })
        })
        .then(res => console.log("Data sent successfully"))
        .catch(err => console.error("Error sending data:", err));
    }
</script>
</body>
</html>
